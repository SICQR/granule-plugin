name: Build GRANULE VST3

on:
  push:
      branches: [main, master]
        workflow_dispatch:

        jobs:

          build-macos:
              name: macOS VST3 (Universal Binary)
                  runs-on: macos-14

                      steps:
                            - name: Checkout
                                    uses: actions/checkout@v4

                                          - name: Install CMake
                                                  run: brew install cmake ninja

                                                        - name: Cache JUCE
                                                                uses: actions/cache@v4
                                                                        with:
                                                                                  path: build-mac/_deps
                                                                                            key: juce-macos-${{ hashFiles('CMakeLists.txt') }}
                                                                                                      restore-keys: juce-macos-
                                                                                                      
                                                                                                            - name: Configure
                                                                                                                    run: |
                                                                                                                              cmake -B build-mac -G Ninja \
                                                                                                                                          -DCMAKE_BUILD_TYPE=Release \
                                                                                                                                                      -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
                                                                                                                                                                  -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13"
                                                                                                                                                                  
                                                                                                                                                                        - name: Build
                                                                                                                                                                                run: cmake --build build-mac --config Release
                                                                                                                                                                                
                                                                                                                                                                                      - name: Package
                                                                                                                                                                                              run: |
                                                                                                                                                                                                        mkdir -p dist-mac
                                                                                                                                                                                                                  cp -r build-mac/GRANULE_artefacts/Release/VST3/GRANULE.vst3 dist-mac/
                                                                                                                                                                                                                            cd dist-mac && zip -r ../GRANULE-macOS.zip .
                                                                                                                                                                                                                            
                                                                                                                                                                                                                                  - name: Upload
                                                                                                                                                                                                                                          uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                            name: GRANULE-macOS
                                                                                                                                                                                                                                                                      path: GRANULE-macOS.zip
                                                                                                                                                                                                                                                                                retention-days: 30
                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                  build-windows:
                                                                                                                                                                                                                                                                                      name: Windows VST3 (x64)
                                                                                                                                                                                                                                                                                          runs-on: windows-latest
                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                              steps:
                                                                                                                                                                                                                                                                                                    - name: Checkout
                                                                                                                                                                                                                                                                                                            uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                  - name: Cache JUCE
                                                                                                                                                                                                                                                                                                                          uses: actions/cache@v4
                                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                                            path: build-win/_deps
                                                                                                                                                                                                                                                                                                                                                      key: juce-windows-${{ hashFiles('CMakeLists.txt') }}
                                                                                                                                                                                                                                                                                                                                                                restore-keys: juce-windows-
                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                      - name: Configure
                                                                                                                                                                                                                                                                                                                                                                              run: cmake -B build-win -A x64 -DCMAKE_BUILD_TYPE=Release
                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                    - name: Build
                                                                                                                                                                                                                                                                                                                                                                                            run: cmake --build build-win --config Release
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                  - name: Package
                                                                                                                                                                                                                                                                                                                                                                                                          shell: pwsh
                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                            New-Item -ItemType Directory -Force -Path dist-win
                                                                                                                                                                                                                                                                                                                                                                                                                                      $vst3 = "build-win\GRANULE_artefacts\Release\VST3\GRANULE.vst3"
                                                                                                                                                                                                                                                                                                                                                                                                                                                if (Test-Path $vst3) { Copy-Item -Recurse $vst3 dist-win\ }
                                                                                                                                                                                                                                                                                                                                                                                                                                                          Compress-Archive -Path dist-win\* -DestinationPath GRANULE-Windows.zip
                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Upload
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          name: GRANULE-Windows
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    path: GRANULE-Windows.zip
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              retention-days: 30
